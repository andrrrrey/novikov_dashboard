# Скопировать в /etc/nginx/sites-available/club, затем symlink в sites-enabled.
server {
    listen 80;
    server_name 217.12.37.176;

    location = /club { return 301 /club/; }

    location /club/api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /club/ {
        alias /var/www/novikov_dashboard/club-frontend/dist/;
        try_files $uri $uri/ /club/index.html;
    }
}
